name: Publish

# Publishes to crates.io on a version tag (e.g. v0.1.0). Requires the
# CARGO_REGISTRY_TOKEN repository secret. Idempotent: a crate version already
# on crates.io is skipped, so a re-run after a partial failure is safe.
on:
  push:
    tags: ["v*"]

permissions:
  contents: read

jobs:
  publish:
    name: cargo publish
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust toolchain
        run: rustup show
      - name: Publish rusty-gasket-macros (skip if already on crates.io)
        run: |
          ver=$(cargo metadata --no-deps --format-version 1 | jq -r '.packages[]|select(.name=="rusty-gasket-macros").version')
          if [ "$(curl -s -o /dev/null -w '%{http_code}' "https://crates.io/api/v1/crates/rusty-gasket-macros/$ver")" = "200" ]; then
            echo "rusty-gasket-macros $ver already on crates.io — skipping"
          else
            cargo publish -p rusty-gasket-macros --token ${{ secrets.CARGO_REGISTRY_TOKEN }}
            echo "waiting for crates.io index..."; sleep 30
          fi
      - name: Publish rusty-gasket (skip if already on crates.io)
        run: |
          ver=$(cargo metadata --no-deps --format-version 1 | jq -r '.packages[]|select(.name=="rusty-gasket").version')
          if [ "$(curl -s -o /dev/null -w '%{http_code}' "https://crates.io/api/v1/crates/rusty-gasket/$ver")" = "200" ]; then
            echo "rusty-gasket $ver already on crates.io — skipping"
          else
            cargo publish -p rusty-gasket --token ${{ secrets.CARGO_REGISTRY_TOKEN }}
          fi
