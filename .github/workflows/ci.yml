name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    name: fmt + clippy + test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # Installs the toolchain pinned in rust-toolchain.toml (+ rustfmt/clippy).
      - name: Install Rust toolchain
        run: rustup show
      - name: Format
        run: cargo fmt --all --check
      - name: Clippy (warnings are errors)
        run: cargo clippy --workspace --all-targets --all-features -- -D warnings
      - name: Test
        run: cargo test --workspace --all-targets --all-features

  supply-chain:
    name: cargo-deny + cargo-audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust toolchain
        run: rustup show
      - name: Install cargo-deny + cargo-audit
        run: cargo install --locked cargo-deny cargo-audit
      - name: cargo deny
        run: cargo deny check
      - name: cargo audit
        run: cargo audit

  no-internal-refs:
    name: no internal references
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check for leaked internal references
        run: ./scripts/check-no-internal-refs.sh
